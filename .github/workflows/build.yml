name: 'publish'

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release version tag, supports v1.2.3 or 1.2.3'
        required: true
        type: string

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: install frontend dependencies
        run: pnpm install

      - name: Prepare release version
        id: prepare-version
        shell: bash
        env:
          VERSION_TAG: ${{ inputs.version_tag }}
        run: node scripts/ci/prepare-release-version.mjs

      - name: Generate release notes
        id: release-notes
        shell: bash
        run: |
          set -euo pipefail
          prev_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"

          if [[ -n "$prev_tag" ]]; then
            notes="$(git log --pretty=format:'- %s' "${prev_tag}..HEAD")"
          else
            notes="$(git log --pretty=format:'- %s')"
          fi

          if [[ -z "$notes" ]]; then
            notes="No commits found."
          fi

          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build the app
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.prepare-version.outputs.release_tag }}
          releaseName: ${{ steps.prepare-version.outputs.release_tag }}
          releaseBody: ${{ steps.release-notes.outputs.notes }}
          releaseDraft: false
          prerelease: false
          releaseCommitish: ${{ github.sha }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.platform == 'macos-latest' && format('--config "{0}" --target universal-apple-darwin', steps.prepare-version.outputs.config_path) || format('--config "{0}"', steps.prepare-version.outputs.config_path) }}
